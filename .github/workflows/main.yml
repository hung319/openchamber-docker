name: Build Multi-arch and Push to GHCR

on:
  schedule:
    - cron: '0 0 * * *' # Chạy tự động lúc 00:00 mỗi ngày
  workflow_dispatch: # Cho phép bấm build bằng tay

env:
  REGISTRY: ghcr.io
  # Chuyển thành tên repo của bạn (vd: username/my-openchamber)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Bắt buộc phải có quyền này để push lên GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup QEMU để giả lập môi trường ARM64 trên máy chủ Linux
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Setup Docker Buildx hỗ trợ multi-platform
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Đăng nhập vào GitHub Container Registry (GHCR)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Trích xuất metadata (tags, labels) cho Docker
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # Lấy thông tin tag mới nhất từ repo gốc (tuỳ chọn)
      - name: Check upstream version
        id: upstream
        run: |
          UPSTREAM_TAG=$(curl -s https://api.github.com/repos/openchamber/openchamber/releases/latest | jq -r .tag_name)
          if [ "$UPSTREAM_TAG" != "null" ]; then
            echo "tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          fi

      # Build và Push cùng lúc cho cả AMD và ARM
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Quan trọng: Khai báo 2 nền tảng ở đây
          platforms: linux/amd64,linux/arm64 
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.upstream.outputs.tag || 'dev' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
