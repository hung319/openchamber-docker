name: Auto Build New Release

on:
  schedule:
    - cron: '0 */6 * * *' # 6 tiếng kiểm tra một lần
  workflow_dispatch: # Cho phép bấm chạy tay

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cần quyền để ghi file version vào repo
      packages: write # Cần quyền để push lên GHCR

    steps:
      # 1. Checkout repo của bạn (để lấy Dockerfile và file latest_version.txt)
      - name: Checkout your repo
        uses: actions/checkout@v4

      # 2. Lấy tag mới nhất từ repo gốc
      - name: Get latest upstream tag
        id: upstream
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/openchamber/openchamber/releases/latest | jq -r .tag_name)
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      # 3. Đọc phiên bản cũ đã build từ file trong repo của bạn
      - name: Read last built version
        id: local_ver
        run: |
          if [ -f latest_version.txt ]; then
            LAST_TAG=$(cat latest_version.txt)
          else
            LAST_TAG="none"
          fi
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

      # 4. So sánh: Nếu tag mới khác tag cũ thì mới chạy build
      - name: Check if build is needed
        id: check
        run: |
          if [ "${{ steps.upstream.outputs.tag }}" != "${{ steps.local_ver.outputs.last_tag }}" ]; then
            echo "build_needed=true" >> $GITHUB_OUTPUT
            echo "Tiến hành build phiên bản mới: ${{ steps.upstream.outputs.tag }}"
          else
            echo "build_needed=false" >> $GITHUB_OUTPUT
            echo "Không có phiên bản mới."
          fi

      # CÁC BƯỚC DƯỚI ĐÂY CHỈ CHẠY NẾU build_needed == true
      
      - name: Checkout OpenChamber source code
        if: steps.check.outputs.build_needed == 'true'
        uses: actions/checkout@v4
        with:
          repository: openchamber/openchamber
          ref: ${{ steps.upstream.outputs.tag }}
          path: openchamber-src

      - name: Set up QEMU
        if: steps.check.outputs.build_needed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.build_needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check.outputs.build_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.build_needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./openchamber-src
          file: ./Dockerfile 
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.upstream.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Cập nhật lại file latest_version.txt vào repo của bạn
      - name: Update version file in repo
        if: steps.check.outputs.build_needed == 'true'
        run: |
          echo "${{ steps.upstream.outputs.tag }}" > latest_version.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_version.txt
          git commit -m "Update build version to ${{ steps.upstream.outputs.tag }}"
          git push
