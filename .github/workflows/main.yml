name: Auto Build NPM Release (Ultra Fast)

on:
  schedule:
    - cron: '0 */12 * * *' # Chạy tự động 2 lần 1 ngày
  workflow_dispatch: # Bấm phát chạy luôn

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      build_needed: ${{ steps.check.outputs.build_needed }}
      tag: ${{ steps.npm_ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      
      # Lấy version mới nhất trực tiếp từ kho NPM
      - id: npm_ver
        run: echo "version=$(npm show @openchamber/web version)" >> $GITHUB_OUTPUT
      
      - id: local_ver
        run: |
          LAST_TAG=$(cat latest_npm_version.txt 2>/dev/null || echo "none")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          
      - id: check
        run: |
          # Nếu chạy bằng tay (workflow_dispatch) -> Luôn luôn build
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ steps.npm_ver.outputs.version }}" != "${{ steps.local_ver.outputs.last_tag }}" ]; then
            echo "build_needed=true" >> $GITHUB_OUTPUT
          else
            echo "build_needed=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.build_needed == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest        # AMD64
            arch: amd64
          - os: ubuntu-24.04-arm     # ARM64
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by arch
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ghcr.io/${{ github.repository }}:${{ needs.check-version.outputs.tag }}-${{ matrix.arch }}

  create-manifest:
    needs: [check-version, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create and push manifest
        run: |
          TAG=${{ needs.check-version.outputs.tag }}
          REPO=ghcr.io/${{ github.repository }}
          docker buildx create --use
          docker buildx imagetools create -t $REPO:latest -t $REPO:$TAG \
            $REPO:$TAG-amd64 \
            $REPO:$TAG-arm64

      - name: Update version file
        uses: actions/checkout@v4
        if: github.event_name == 'schedule'
      - name: Commit version
        if: github.event_name == 'schedule'
        run: |
          echo "${{ needs.check-version.outputs.tag }}" > latest_npm_version.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_npm_version.txt
          git commit -m "Update build version to ${{ needs.check-version.outputs.tag }}"
          git push
