name: Auto Build New Release (Ultra Fast)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      build_needed: ${{ steps.check.outputs.build_needed }}
      tag: ${{ steps.upstream.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: upstream
        run: echo "tag=$(curl -s https://api.github.com/repos/openchamber/openchamber/releases/latest | jq -r .tag_name)" >> $GITHUB_OUTPUT
      - id: local_ver
        run: |
          LAST_TAG=$(cat latest_version.txt 2>/dev/null || echo "none")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
      - id: check
        run: |
          if [ "${{ steps.upstream.outputs.tag }}" != "${{ steps.local_ver.outputs.last_tag }}" ]; then
            echo "build_needed=true" >> $GITHUB_OUTPUT
          else
            echo "build_needed=false" >> $GITHUB_OUTPUT
          fi

  # JOB BUILD CHÍNH - Chạy song song AMD64 và ARM64
  build:
    needs: check-version
    if: needs.check-version.outputs.build_needed == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest        # Máy AMD64
            arch: amd64
          - os: ubuntu-24.04-arm     # Máy ARM64 (Dùng đúng cái bạn vừa tìm thấy!)
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: openchamber/openchamber
          ref: ${{ needs.check-version.outputs.tag }}
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build và push theo từng kiến trúc riêng biệt
      - name: Build and push by arch
        uses: docker/build-push-action@v5
        with:
          context: .
          # Trỏ về Dockerfile trong repo của bạn (cần bước checkout config nữa nếu file nằm ở repo khác)
          file: Dockerfile 
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ghcr.io/${{ github.repository }}:${{ needs.check-version.outputs.tag }}-${{ matrix.arch }}

  # JOB CUỐI: Gộp 2 bản lại thành 1 Manifest duy nhất (Để người dùng chỉ cần pull tag :latest)
  create-manifest:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create and push manifest
        run: |
          TAG=${{ needs.check-version.outputs.tag }}
          REPO=ghcr.io/${{ github.repository }}
          docker buildx create --use
          docker buildx imagetools create -t $REPO:latest -t $REPO:$TAG \
            $REPO:$TAG-amd64 \
            $REPO:$TAG-arm64

      - name: Update version file
        uses: actions/checkout@v4
      - run: |
          echo "${{ needs.check-version.outputs.tag }}" > latest_version.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_version.txt
          git commit -m "Update build version to ${{ needs.check-version.outputs.tag }}"
          git push
