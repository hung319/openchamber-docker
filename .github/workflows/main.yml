name: Auto Build New Release (Ultra Fast)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: # Chạy thủ công bằng tay

jobs:
  check-version:
    # Chỉ chạy job này nếu là chạy tự động (schedule)
    # Nếu chạy thủ công (workflow_dispatch), job này sẽ bị bỏ qua (skipped)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      build_needed: ${{ steps.check.outputs.build_needed }}
      tag: ${{ steps.upstream.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: upstream
        run: echo "tag=$(curl -s https://api.github.com/repos/openchamber/openchamber/releases/latest | jq -r .tag_name)" >> $GITHUB_OUTPUT
      - id: local_ver
        run: |
          LAST_TAG=$(cat latest_version.txt 2>/dev/null || echo "none")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
      - id: check
        run: |
          if [ "${{ steps.upstream.outputs.tag }}" != "${{ steps.local_ver.outputs.last_tag }}" ]; then
            echo "build_needed=true" >> $GITHUB_OUTPUT
          else
            echo "build_needed=false" >> $GITHUB_OUTPUT
          fi

  build:
    # Điều kiện logic: 
    # 1. Nếu chạy thủ công (workflow_dispatch) -> CHẠY LUÔN.
    # 2. Nếu chạy tự động (schedule) -> Chỉ chạy nếu check-version báo build_needed=true.
    needs: check-version
    if: |
      always() && 
      (github.event_name == 'workflow_dispatch' || 
      (needs.check-version.result == 'success' && needs.check-version.outputs.build_needed == 'true'))
    strategy:
      matrix:
        include:
          - os: ubuntu-latest        # AMD64
            arch: amd64
          - os: ubuntu-24.04-arm     # ARM64 (Tận dụng máy chủ ARM bạn vừa tìm thấy)
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      # Lấy tag: Nếu chạy thủ công thì lấy bản latest từ API, nếu tự động thì lấy từ job check-version
      - name: Get Target Tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG=$(curl -s https://api.github.com/repos/openchamber/openchamber/releases/latest | jq -r .tag_name)
          else
            TAG=${{ needs.check-version.outputs.tag }}
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: openchamber/openchamber
          ref: ${{ steps.vars.outputs.tag }}
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by arch
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.tag }}-${{ matrix.arch }}

  create-manifest:
    needs: [check-version, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get Target Tag (Repeat for manifest)
        id: vars
        run: |
          TAG=$(curl -s https://api.github.com/repos/openchamber/openchamber/releases/latest | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      
      - name: Create and push manifest
        run: |
          TAG=${{ steps.vars.outputs.tag }}
          REPO=ghcr.io/${{ github.repository }}
          docker buildx create --use
          docker buildx imagetools create -t $REPO:latest -t $REPO:$TAG \
            $REPO:$TAG-amd64 \
            $REPO:$TAG-arm64

      - name: Update version file
        uses: actions/checkout@v4
        if: github.event_name == 'schedule' # Chỉ cập nhật file text khi chạy tự động
      - name: Commit version
        if: github.event_name == 'schedule'
        run: |
          echo "${{ steps.vars.outputs.tag }}" > latest_version.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_version.txt
          git commit -m "Update build version to ${{ steps.vars.outputs.tag }}"
          git push
